{% extends "base.html" %}

{% block content %}
<div class="card">
    <img src="{{ url_for('static', filename='img/' + user.img) }}" alt="{{ user.name }}" style="width:150px; border-radius:50%; margin-bottom:15px;">
    
    <h1 class="gold-accent">{{ user.name }}</h1>
    <p>{{ user.bio }}</p>
    <h3>Contact Info</h3>
    <p>{{ user.contactInfo }}</p>
    
    <h3>Technical Interests</h3>
    <ul>
        {% for interest in user.interests %}
            <li>{{ interest }}</li>
        {% endfor %}
    </ul>
</div>

<div class="card" style="border-top: 2px solid #FFCD00; margin-top: 30px;">
    <h2 class="gold-accent">Send a Message</h2>
    <form action="/send_message" method="POST">
        <input type="hidden" name="recipient" value="{{ user.name }}">
        <input type="text" name="name" placeholder="Your Name" required>
        <textarea name="message" rows="4" placeholder="How can I help you?" required></textarea>
        <button type="submit" class="btn">Submit Message</button>
    </form>
</div>
{% endblock %}
