{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
    <h2 class="gold-accent">Protected Access</h2>

    {% if error %}
        <p style="color: #ff4444;">{{ error }}</p>
    {% endif %}

    <p>Please enter the laboratory password to view message logs.</p>
    <form method="POST">
        <input type="password" name="password" placeholder="Password" required autofocus>
        <button type="submit" class="btn" style="width: 100%;">Unlock Content</button>
    </form>
</div>
{% endblock %}
